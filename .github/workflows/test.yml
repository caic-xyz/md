# Run tests, linters, and smoke tests on push.
on: [push]
name: Run tests
jobs:
  # Runs go test both with code coverage sent to codecov, race detector and
  # benchmarks. At the end do a quick check to ensure the tests to not leave
  # files in the tree.
  test:
    name: "test: ${{matrix.os}}"
    runs-on: "${{matrix.os}}"
    continue-on-error: true
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      PYTHONDONTWRITEBYTECODE: x
    steps:
      - name: Turn off git core.autocrlf
        if: matrix.os == 'windows-latest'
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: "go install necessary tools"
        if: always()
        run: |
          go install github.com/maruel/pat/cmd/ba@latest
      - name: "Check: go test -cover (full)"
        # Only run costly tests on linux.
        if: matrix.os == 'ubuntu-latest'
        env:
          # Make sure we don't get throttled calling github apis.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go test -timeout=600s -covermode=count -coverprofile coverage.txt -bench=. -benchtime=1x ./...
      - name: "Check: go test -cover (light)"
        if: matrix.os == 'windows-latest' || matrix.os == 'macos-latest'
        env:
          # Make sure we don't get throttled calling github apis.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go test -timeout=600s -covermode=count -coverprofile coverage.txt -bench=. -benchtime=1x ./...
        # Don't send code coverage if anything failed to reduce spam.
      - uses: codecov/codecov-action@v6
        with:
          token: ${{secrets.CODECOV_TOKEN}}
      - name: "Cleanup"
        if: always()
        run: rm -f coverage.txt codecov codecov.*
      - name: "Check: tree is clean"
        if: always()
        run: |
          # Nothing should have changed in the tree up to that point and no
          # unsuspected file was created.
          TOUCHED=$(git status --porcelain)
          if ! test -z "$TOUCHED"; then
            echo "Oops, something touched these files, please cleanup:"
            echo "$TOUCHED"
            git diff
            false
          fi

    # Run linters. This workflow can be merged with the test_all one if desired
    # to cut on runtime, at the cost of latency. I dislike waiting for results
    # so I prefer to run them in parallel.
  lint:
    name: "lint: ${{matrix.os}}"
    runs-on: "${{matrix.os}}"
    continue-on-error: true
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      PYTHONDONTWRITEBYTECODE: x
    steps:
      - name: Turn off git core.autocrlf
        if: matrix.os == 'windows-latest'
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go install mvdan.cc/sh/v3/cmd/shfmt@latest
        if: runner.os == 'Linux'
      - name: "Check: shellcheck"
        if: runner.os == 'Linux'
        run: |
          mapfile -d '' shell_files < <(
            find rsc -type f \( -name '*.sh' -o -perm /111 \) -print0 |
              while IFS= read -r -d '' file; do
                first_line=$(head -n 1 "$file")
                case "$file:$first_line" in
                  *.sh:* | *:'#!'*'/sh'* | *:'#!'*'/bash'* | *:'#!'*'env sh'* | *:'#!'*'env bash'*)
                    printf '%s\0' "$file"
                    ;;
                esac
              done
          )
          shellcheck -x "${shell_files[@]}"
      - name: "Check: shfmt"
        if: runner.os == 'Linux'
        run: |
          mapfile -d '' shell_files < <(
            find rsc -type f \( -name '*.sh' -o -perm /111 \) -print0 |
              while IFS= read -r -d '' file; do
                first_line=$(head -n 1 "$file")
                case "$file:$first_line" in
                  *.sh:* | *:'#!'*'/sh'* | *:'#!'*'/bash'* | *:'#!'*'env sh'* | *:'#!'*'env bash'*)
                    printf '%s\0' "$file"
                    ;;
                esac
              done
          )
          unformatted=$("$HOME/go/bin/shfmt" -l "${shell_files[@]}")
          if [ -n "$unformatted" ]; then
            echo "These shell files need shfmt:"
            echo "$unformatted"
            exit 1
          fi
      - uses: actions/setup-python@v6
        if: runner.os == 'Linux'
        with:
          python-version-file: '.python-version'
      - run: pip install pylint ruff
        if: runner.os == 'Linux'
      - run: pylint .
        if: runner.os == 'Linux'
      - run: ruff check --no-cache
        if: runner.os == 'Linux'

      - name: "Check: golangci-lint"
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...
      - name: "go install necessary tools (ubuntu)"
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          go install github.com/google/addlicense@latest
      - name: "Check: no executable was committed (ubuntu)"
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          if find . -type f -not -path './.git/*' -not -path './cache/*' -not -path './py/venv/*' -not -name '*.desktop' -perm /111 -exec sh -c 'test "$(head -c2 "$1")" != "#!"' _ {} \; -print | grep -e . ; then
            echo 'Do not commit executables that are not scripts (missing #! shebang)'
            false
          fi
      - name: "Check: addlicense; all sources have a license header (ubuntu)"
        if: always() && matrix.os == 'ubuntu-latest'
        run: addlicense -ignore "rsc/root/**" -ignore "rsc/user/**" -check .
      - name: "Check: go generate doesn't modify files"
        if: always()
        run: |
          go generate ./...
          # Also test for untracked files. go generate should not generate ignored
          # files either.
          TOUCHED=$(git status --porcelain --ignored)
          if ! test -z "$TOUCHED"; then
            echo "go generate created these files, please fix:"
            echo "$TOUCHED"
            false
          fi
      - name: "Check: go mod tidy doesn't modify files"
        if: always()
        run: |
          go mod tidy
          TOUCHED=$(git status --porcelain --ignored)
          if ! test -z "$TOUCHED"; then
            echo "go mod tidy was not clean, please update:"
            git diff
            false
          fi

  # Runs the smoke test (end-to-end container lifecycle) with code coverage.
  smoke:
    name: "smoke: ubuntu-latest"
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    env:
      PYTHONDONTWRITEBYTECODE: x
    steps:
      - name: Maximize Docker/Podman Space
        run: |
          sudo systemctl stop docker.service docker.socket containerd.service
          sudo rm -rf /var/lib/docker
          sudo mkdir -p /mnt/docker
          sudo ln -s /mnt/docker /var/lib/docker
          sudo systemctl start containerd.service docker.service
          sudo mkdir -p /mnt/user-containers
          sudo chown "$USER:$USER" /mnt/user-containers
          sudo mkdir -p /mnt/go-test-tmp
          sudo chown "$USER:$USER" /mnt/go-test-tmp
          mkdir -p ~/.local/share
          ln -s /mnt/user-containers ~/.local/share/containers
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: "Check: go test -tags=smoke (short)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TMPDIR: /mnt/go-test-tmp
        run: go test -tags=smoke -run TestSmoke -short -v -timeout 30m -covermode=count -coverprofile coverage_smoke.txt
      - uses: codecov/codecov-action@v6
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: coverage_smoke.txt
          flags: smoke

  codeql:
    name: "codeql: ${{matrix.os}}"
    runs-on: "${{matrix.os}}"
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@v4
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
