# Dispatch image builds from triggering events.
name: Dispatch image builds

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/docker-build-root.yml
      - .github/workflows/docker-build-user.yml
      - rsc/root/**
      - rsc/user/**

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths and dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! git diff --quiet "${{ github.event.before }}" "${{ github.event.after }}" -- rsc/root/ .github/workflows/docker-build-root.yml; then
            echo "Root build inputs changed: dispatching root build (root will chain to user)."
            gh workflow run docker-build-root.yml --ref "${{ github.ref }}"
          elif ! git diff --quiet "${{ github.event.before }}" "${{ github.event.after }}" -- rsc/user/ .github/workflows/docker-build-user.yml; then
            echo "User build inputs changed: dispatching user build directly."
            gh workflow run docker-build-user.yml --ref "${{ github.ref }}"
          else
            echo "No relevant changes."
          fi
